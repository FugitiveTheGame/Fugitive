name: Build & Pre-Release

on:
  push:
    tags:
      - "v*"

jobs:
  export_game:
    runs-on: ubuntu-latest
    permissions: write-all
    name: Export Game
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install wine
        id: wine_install
        run: |
          sudo apt install wine64
          echo "WINE_PATH=$(which wine64)" >> $GITHUB_OUTPUT

      - name: set up Android keystores
        if: always()
        env:
          # ‑‑ Release credentials come from repo secrets ‑‑
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
          ANDROID_KEY_ALIAS:            ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:         ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p ~/.android ~/.config/godot

          # 1) --- RELEASE KEYSTORE (decoded from secret) ---------------------
          echo "$ANDROID_RELEASE_KEYSTORE_B64" | base64 --decode \
            > ~/.android/release.keystore

          # 2) --- DEBUG KEYSTORE (generate a disposable one) -----------------
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass  android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA -keysize 2048 -validity 10000

          # 3) --- Tell Godot where both keystores live -----------------------
          cat >> ~/.config/godot/editor_settings-3.tres <<EOF
[android]
debug_keystore="$HOME/.android/debug.keystore"
debug_keystore_user="androiddebugkey"
debug_keystore_pass="android"
release_keystore="$HOME/.android/release.keystore"
release_keystore_user="$ANDROID_KEY_ALIAS"
release_keystore_pass="$ANDROID_KEY_PASSWORD"
EOF


      - name: export game
        id: export
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/3.6.1-stable/Godot_v3.6.1-stable_linux_headless.64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/3.6.1-stable/Godot_v3.6.1-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: true
          use_godot_3: true
          wine_path: ${{ steps.wine_install.outputs.WINE_PATH }}

      - name: create release
        uses: ncipollo/release-action@v1.14.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          tag: ${{ github.ref_name }}
          artifacts: ${{ steps.export.outputs.archive_directory }}/*
