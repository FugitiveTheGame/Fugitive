name: Build & Pre-Release

on:
  push:
    tags:
      - 'v*'

jobs:
  export:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - preset: "Windows Desktop"
            out: Fugitive_Windows.zip
            godot_url: https://github.com/godotengine/godot/releases/download/3.6.1-stable/Godot_v3.6.1-stable_win64.exe.zip
            archive_output: false

          - preset: "Linux/X11"
            out: Fugitive_Linux.zip
            godot_url: https://github.com/godotengine/godot/releases/download/3.6.1-stable/Godot_v3.6.1-stable_linux_headless.64.zip
            archive_output: true

          - preset: "Android"
            out: Fugitive_Android.apk
            godot_url: https://github.com/godotengine/godot/releases/download/3.6.1-stable/Godot_v3.6.1-stable_linux_headless.64.zip
            archive_output: true

            
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: install wine
        id: wine_install
        run: |
          sudo apt install wine64
          echo "WINE_PATH=$(which wine64)" >> $GITHUB_OUTPUT

      - name: Export ${{ matrix.preset }}
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: ${{ matrix.godot_url }}
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/3.6.1-stable/Godot_v3.6.1-stable_export_templates.tpz
          presets_to_export: "${{ matrix.preset }}"
          relative_export_path: build
          use_godot_3: true
          archive_output: ${{ matrix.archive_output }}
          wine_path: ${{ steps.wine_install.outputs.WINE_PATH }}

      - name: Rename output
        run: mv build/* "${{ matrix.out }}"
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: ${{ matrix.out }}

  release:
    needs: export
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: true
          files: dist/**/*
