name: Build & Pre-Release

on:
  push:
    tags:
      - 'v*'

jobs:
  export:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            preset: "Windows Desktop"
            out:   Fugitive_Windows.zip

          - os: ubuntu-latest
            preset: "Linux/X11"
            out:   Fugitive_Linux.zip

          - os: macos-latest
            preset: "Mac OSX"
            out:   Fugitive_OSX.zip

          - os: ubuntu-latest
            preset: "Android"
            out:   Fugitive_Android.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up rcedit (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $rceditUrl  = "https://github.com/electron/rcedit/releases/download/v1.1.1/rcedit-x64.exe"
          $rceditPath = "$env:RUNNER_TEMP\rcedit.exe"
          Invoke-WebRequest -Uri $rceditUrl -OutFile $rceditPath

          $godotDir     = "$env:APPDATA\Godot"
          New-Item -ItemType Directory -Force -Path $godotDir | Out-Null
          $settingsFile = "$godotDir\editor_settings-3.tres"

          Add-Content -Path $settingsFile -Value "`n[export]`nwindows/rcedit=""$rceditPath""`n"

      - name: Export ${{ matrix.preset }}
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_version: "3.6.1"
          use_mono: false
          export_templates: true
          export_presets: "${{ matrix.preset }}"
          output_path: "build"

      - name: Rename output
        run: |
          mv build/* "${{ matrix.out }}"
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: ${{ matrix.out }}

  release:
    needs: export
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: true
          files: dist/**/*
