name: Build & Pre-Release

on:
  push:
    tags:
      - "v*"

jobs:
  export_game:
    runs-on: ubuntu-latest
    permissions: write-all
    name: Export Game
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install wine
        id: wine_install
        run: |
          sudo apt install wine64
          echo "WINE_PATH=$(which wine64)" >> $GITHUB_OUTPUT

      - name: setup release keystore for Android export
        if: always()
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}   # base64‑encoded .keystore
          ANDROID_KEY_ALIAS:        ${{ secrets.ANDROID_KEY_ALIAS }}                  # e.g. “myreleasekey”
          ANDROID_KEY_PASSWORD:     ${{ secrets.ANDROID_KEY_PASSWORD }}               # keystore / key password
        run: |
          # 1) Write the keystore file
          mkdir -p ~/.android
          echo "$ANDROID_KEYSTORE_B64" | base64 --decode > ~/.android/release.keystore

          # 2) Tell Godot where to find it (3.x editor settings)
          mkdir -p ~/.config/godot
          {
            echo "[android]"
            echo "release_keystore=\"${HOME}/.android/release.keystore\""
            echo "release_keystore_user=\"$ANDROID_KEY_ALIAS\""
            echo "release_keystore_pass=\"$ANDROID_KEY_PASSWORD\""
          } >> ~/.config/godot/editor_settings-3.tres

      - name: export game
        id: export
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/3.6.1-stable/Godot_v3.6.1-stable_linux_headless.64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/3.6.1-stable/Godot_v3.6.1-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: true
          use_godot_3: true
          wine_path: ${{ steps.wine_install.outputs.WINE_PATH }}

      - name: create release
        uses: ncipollo/release-action@v1.14.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          tag: ${{ github.ref_name }}
          artifacts: ${{ steps.export.outputs.archive_directory }}/*
